name: Validate Data

on:
  push:
    branches: [master]
    paths: ['db/**', 'data.json', 'tests/**']
  pull_request:
    paths: ['db/**', 'data.json', 'tests/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tests/validate-data.js
